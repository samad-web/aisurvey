# nginx server for the LexDraft Survey SPA. Mirrors apps/web/nginx.conf but
# scoped to a single-route public app (the /survey study).

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    client_max_body_size 1m;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/wasm
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    add_header X-Content-Type-Options       "nosniff"                              always;
    add_header X-Frame-Options              "DENY"                                 always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;

    location ~* ^/assets/.+\.(?:js|mjs|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico|map)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(?:woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        expires off;
    }

    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
