# One-command local stack: Postgres + API + SPA. Run:
#   docker compose up --build
#   docker compose exec api npm run migrate   # first time only
#
# Then open http://localhost:8080.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: survey
      POSTGRES_DB: lexdraft_survey
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d lexdraft_survey"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgres://survey:survey@db:5432/lexdraft_survey
      DATABASE_SSL: "false"
      CORS_ORIGIN: ""
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Empty so the SPA calls /api on its own origin - the nginx config
        # in front of this stack is expected to route /api/* to the api
        # service. For dev without a proxy, point this at http://localhost:4000.
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  dbdata:
